<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WinAerials</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap">
  <style>
    /* CSS Reset and black background to avoid flashes */
    html,
    body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: var(--root-font, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial);
    }

    :root {
      --root-font: 'Inter';
    }

    #video_element {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      pointer-events: none;
    }

    .bubbly-button {
      border-radius: 30px;
      /* Sleeker padding and text sizing */
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Inter', 'Segoe UI', sans-serif;

      /* Frosted glass/semi-transparent background to blend into the video */
      background: rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      outline: none;

      /* Muted shadow */
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);

      /* Smooth transition signature */
      transition: all 0.2s ease-in-out;
      pointer-events: auto !important;
    }

    /* Subtle Interactive Adjustments */
    .bubbly-button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.25);
      color: #fff;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
    }

    .bubbly-button:active {
      transform: translateY(0);
      background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>

<body>

  <video id="video_element" autoplay muted playsinline>
    <!-- MOVIE_URL_START -->
    <source
      src="https://sylvan.apple.com/itunes-assets/Aerials116/v4/cb/5b/50/cb5b5035-6701-619f-9065-3d7d0e5fbef4/comp_H004_C007_PS_v02_SDR_PS_20180925_FRC_sdr_4k_qp19_240p_t2160_tsa.mov">
    <!-- MOVIE_URL_END -->
  </video>

  <div
    style="position:fixed; left:40px; text-align:left; bottom:70px; z-index: 99999;display: flex; align-items: center; gap: 10px">
    <div id="title_element" style="font-size:1.1rem; font-weight:400; opacity:0.7;">
      <!-- MOVIE_TITLE_START -->Hawaii<!-- MOVIE_TITLE_END -->
    </div>
    <div style="font-size:2.5rem; font-weight:300; opacity:0.9;" id="time_element" data-format="hh:mm A"></div>
    <div id="next_video_btn" class="bubbly-button">Next Video</div>
    <div id="close_btn" class="bubbly-button" style="background: rgba(255, 0, 0, 0.2);">Exit</div>
  </div>

  <script src="./playlist.js"></script>

  <!-- 1. Create the blank array container in memory first -->
  <script>
    let playlist = [];
    let parsedTracks = [];
    let currentIndex = parseInt(localStorage.getItem('aerials_last_index')) || 0;
  </script>

  <script src="./playlist.js"></script>

  <script>
    function formatDate(d, fmt) {
      var hh = d.getHours() % 12; if (hh === 0) hh = 12; var HH = d.getHours();
      var mm = (d.getMinutes() < 10 ? '0' + d.getMinutes() : d.getMinutes());
      var A = d.getHours() >= 12 ? 'PM' : 'AM';
      return fmt.replace('hh', hh).replace('HH', HH).replace('mm', mm).replace('A', A);
    }

    function updateTimes() {
      var timeEl = document.getElementById('time_element');
      if (timeEl) {
        var f = timeEl.getAttribute('data-format') || 'HH:mm';
        timeEl.textContent = formatDate(new Date(), f);
      }
    }

    setInterval(updateTimes, 60 * 1000);
    updateTimes();

    const videoElement = document.getElementById('video_element');
    const locationElement = document.getElementById('title_element');
    const nextBtnElement = document.getElementById('next_video_btn');
    const closeBtnElement = document.getElementById('close_btn');

    if (closeBtnElement) {
      closeBtnElement.addEventListener('click', function () {
        // This will force Edge to kill the window and return to desktop
        window.open('', '_self').close();
      });
    }

    function parseAndPlayPlaylist() {
      try {
        if (!playlist || playlist.length === 0) {
          alert("Playlist array is empty! Verify playlist.js has valid lines looking like: playlist.push(\"url|location\");");
          return;
        }

        // Properly map the split across the string indices generated by your .js file injections
        parsedTracks = playlist.map(line => {
          if (typeof line !== 'string') return null;
          const parts = line.split('|');
          return {
            url: parts[0] ? parts[0].trim() : '',
            location: parts[1] ? parts[1].trim() : 'Unknown Location'
          };
        }).filter(item => item && item.url.length > 0);

        if (parsedTracks.length > 0) {
          playVideoTrack();
        } else {
          alert("Failed parsing: No usable data found inside the playlist items.");
        }
      } catch (err) {
        alert("Error reading processed lines: " + err.message);
      }
    }

    function playVideoTrack() {
      if (!parsedTracks || parsedTracks.length === 0) {
        alert("No parsed tracks available to play.");
        return;
      }

      const currentTrack = parsedTracks[currentIndex];
      videoElement.src = currentTrack.url;

      if (locationElement) {
        locationElement.textContent = currentTrack.location;
      }

      videoElement.play().catch(err => alert("Playback execution dropped: " + err.message));

      localStorage.setItem('aerials_last_index', currentIndex);

      currentIndex = (currentIndex + 1) % parsedTracks.length;
    }

    // Action listeners
    videoElement.addEventListener('ended', playVideoTrack);

    if (nextBtnElement) {
      nextBtnElement.addEventListener('click', function (e) {
        playVideoTrack();
      });
    }

    // Run layout initializer directly
    parseAndPlayPlaylist();
  </script>
</body>

</html>
